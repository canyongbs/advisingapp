services:
    local-cli:
        build:
            context: .
            target: cli-local-tooling
            args:
                USER_ID: '${PLS_USER_ID:-33}'
                GROUP_ID: '${PLS_GROUP_ID:-33}'
        environment:
            CREATE_STORAGE_SYMLINK: false
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - '.:/var/www/html'
        networks:
            - cgbs-development

networks:
    cgbs-development:
        external: true
