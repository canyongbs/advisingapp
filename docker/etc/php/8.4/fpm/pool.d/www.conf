[www]
listen = /run/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

pm = static
pm.max_children = 12
pm.max_requests = 500
pm.status_path = /status

request_terminate_timeout = 120s
request_slowlog_timeout = 10s
slowlog = /dev/stderr

ping.path = /fpm-ping
ping.response = pong

clear_env = no
catch_workers_output = yes
decorate_workers_output = no
