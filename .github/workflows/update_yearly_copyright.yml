name: Update Yearly Copyright

on:
    workflow_dispatch:
    schedule: # Run every year on January 1st
        - cron: '0 0 1 1 *' # UTC time

permissions: {}

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

jobs:
    update-copyright:
        name: Update Copyright
        runs-on: ubuntu-22.04

        timeout-minutes: 10

        steps:
            - name: Checkout `main` Branch
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  token: ${{ secrets.PAT }} # zizmor: ignore[secrets-outside-env]
                  persist-credentials: true # zizmor: ignore[artipacked] -- credentials needed for git push

            - name: Set up Ruby
              uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0

            - name: Run copyright script
              run: ruby ./copyright.rb

            - name: Create Pull Request
              env:
                  GH_TOKEN: ${{ secrets.PAT }} # zizmor: ignore[secrets-outside-env]
              run: |
                  BRANCH="update-yearly-copyright-$(date +%s)"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "${BRANCH}"
                  git add -A
                  git diff --cached --quiet && echo "No changes" && exit 0
                  git commit -m "chore: update yearly copyright"
                  git push origin "${BRANCH}"
                  gh pr create \
                    --title "Update yearly copyright" \
                    --body "This is an automated pull request to update the yearly copyright." \
                    --head "${BRANCH}"
