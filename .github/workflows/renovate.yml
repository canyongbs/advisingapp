name: Run Renovate

on:
    schedule:
        - cron: '0 11 * * *' # Every day at 11am UTC
    workflow_dispatch:

permissions: {}

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

jobs:
    renovate:
        name: Run Renovate
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Generate GitHub App Token
              id: app-token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  client-id: ${{ secrets.CGBS_AUTOMATION_APP_CLIENT_ID }} # zizmor: ignore[secrets-outside-env]
                  private-key: ${{ secrets.CGBS_AUTOMATION_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
                  permission-contents: write
                  permission-issues: write
                  permission-pull-requests: write
                  permission-workflows: write
                  permission-checks: write
                  permission-statuses: write
                  permission-vulnerability-alerts: read
                  permission-administration: read

            - name: Run Renovate
              uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
              with:
                  configurationFile: renovate-config.json
                  token: ${{ steps.app-token.outputs.token }}
